<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曲目单详情 - 2026年热门歌手演唱会曲目参考</title>
    <meta name="description" content="查看演唱会完整曲目单，包含安可曲目、翻唱改编、经典曲目标注及亮点信息。">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ===== 曲目单详情页专属样式 ===== */

        /* 顶部信息区 */
        .setlist-header {
            background: linear-gradient(135deg, #1a1a5e 0%, #2d1b69 50%, #4a1a8a 100%);
            color: #ffffff;
            padding: 32px 0;
            position: relative;
            overflow: hidden;
        }

        .setlist-header::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(100, 80, 200, 0.25) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 30%, rgba(60, 40, 160, 0.2) 0%, transparent 50%);
            pointer-events: none;
        }

        .setlist-header .container {
            position: relative;
            z-index: 1;
        }

        .setlist-header-top {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .setlist-artist-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.4);
            flex-shrink: 0;
            background-color: rgba(255, 255, 255, 0.15);
        }

        .setlist-artist-info h1 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .setlist-tour-name {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0;
        }

        .setlist-show-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
        }

        .setlist-show-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .setlist-show-meta .meta-icon {
            font-size: 16px;
            opacity: 0.8;
        }

        .setlist-header-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .setlist-status-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-badge.status-past {
            background-color: #D1FAE5;
            color: #065F46;
        }

        .status-badge.status-upcoming {
            background-color: #FEF3C7;
            color: #92400E;
        }

        .source-tag {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            background-color: rgba(255, 255, 255, 0.1);
            padding: 3px 10px;
            border-radius: 12px;
        }

        .update-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.55);
        }

        .upcoming-hint {
            font-size: 12px;
            color: #FCD34D;
            font-style: italic;
        }

        .setlist-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setlist-actions .btn-favorite {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background-color: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .setlist-actions .btn-favorite:hover {
            background-color: rgba(255, 255, 255, 0.25);
        }

        .setlist-actions .btn-favorite.favorited {
            background-color: #F87171;
            border-color: #F87171;
            color: #ffffff;
        }

        .setlist-actions .btn-favorite .heart-icon {
            font-size: 16px;
        }

        .share-buttons {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .share-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .share-btn:hover {
            background-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.08);
        }

        /* 主内容区布局 */
        .setlist-layout {
            display: flex;
            gap: 28px;
            align-items: flex-start;
        }

        .setlist-main {
            flex: 1;
            min-width: 0;
        }

        /* 曲目列表区 */
        .setlist-section {
            background-color: var(--color-white);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            padding: 24px;
            margin-bottom: 24px;
        }

        .setlist-section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--color-primary);
        }

        .setlist-section-title h2 {
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .setlist-section-title .song-count {
            font-size: 14px;
            color: var(--color-text-secondary);
            font-weight: 400;
        }

        .btn-compare {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            font-size: 13px;
            color: var(--color-primary);
            background-color: var(--color-primary-bg);
            border: 1px solid var(--color-primary);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .btn-compare:hover {
            background-color: var(--color-primary);
            color: #ffffff;
        }

        /* 曲目项 */
        .setlist-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--color-light-gray);
            cursor: pointer;
            transition: background-color 0.15s ease;
            position: relative;
        }

        .setlist-item:last-child {
            border-bottom: none;
        }

        .setlist-item:hover {
            background-color: var(--color-primary-bg);
        }

        .setlist-item .song-index {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--color-text-secondary);
            background-color: var(--color-light-gray);
            border-radius: 50%;
        }

        .setlist-item .song-info {
            flex: 1;
            min-width: 0;
        }

        .setlist-item .song-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .setlist-item .song-title .expand-icon {
            font-size: 12px;
            color: var(--color-text-muted);
            transition: transform 0.2s ease;
        }

        .setlist-item.expanded .song-title .expand-icon {
            transform: rotate(90deg);
        }

        .setlist-item .song-tags {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .setlist-item .song-highlight {
            font-size: 12px;
            color: #D97706;
            font-weight: 600;
            margin-top: 2px;
        }

        .setlist-item .song-highlight::before {
            content: "\2726 ";
        }

        /* 展开的曲目详情 */
        .song-detail {
            display: none;
            padding: 10px 16px 12px 62px;
            background-color: #F9FAFB;
            border-bottom: 1px solid var(--color-light-gray);
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .song-detail.show {
            display: block;
        }

        .song-detail .detail-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .song-detail .detail-row:last-child {
            margin-bottom: 0;
        }

        .song-detail .detail-label {
            color: var(--color-text-muted);
            min-width: 56px;
        }

        .song-detail .detail-value {
            color: var(--color-text-primary);
            font-weight: 500;
        }

        .song-detail .detail-source {
            font-size: 12px;
            color: var(--color-text-muted);
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px dashed var(--color-medium-gray);
        }

        /* 安可分隔线 */
        .encore-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            margin: 4px 0;
        }

        .encore-divider::before,
        .encore-divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--color-accent), transparent);
        }

        .encore-divider span {
            font-size: 15px;
            font-weight: 700;
            color: var(--color-accent);
            white-space: nowrap;
            letter-spacing: 2px;
        }

        /* 对比面板 */
        .compare-panel {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 2000;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .compare-panel.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .compare-panel-content {
            background-color: var(--color-white);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 28px;
            box-shadow: var(--shadow-xl);
            animation: fadeInUp 0.3s ease;
        }

        .compare-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--color-light-gray);
        }

        .compare-panel-header h3 {
            font-size: 18px;
            font-weight: 700;
        }

        .compare-close-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 20px;
            color: var(--color-text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .compare-close-btn:hover {
            background-color: var(--color-light-gray);
            color: var(--color-text-primary);
        }

        .compare-show-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .compare-show-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background-color: var(--color-light-gray);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.15s ease;
            text-decoration: none;
            color: inherit;
        }

        .compare-show-item:hover {
            background-color: var(--color-primary-bg);
            border-color: var(--color-primary);
        }

        .compare-show-item .compare-date {
            flex-shrink: 0;
            width: 56px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--color-primary);
        }

        .compare-show-item .compare-info {
            flex: 1;
            min-width: 0;
        }

        .compare-show-item .compare-city {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .compare-show-item .compare-venue {
            font-size: 12px;
            color: var(--color-text-secondary);
        }

        .compare-show-item .compare-count {
            flex-shrink: 0;
            font-size: 12px;
            color: var(--color-text-muted);
        }

        /* 侧边栏 */
        .sidebar {
            flex-shrink: 0;
            width: 300px;
        }

        .sidebar-widget {
            background-color: var(--color-white);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-sm);
            padding: 20px;
            margin-bottom: 20px;
        }

        .sidebar-widget:last-child {
            margin-bottom: 0;
        }

        .sidebar-widget-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--color-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sidebar-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .sidebar-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--color-light-gray);
            text-decoration: none;
            color: inherit;
            transition: color 0.15s ease;
        }

        .sidebar-list-item:last-child {
            border-bottom: none;
        }

        .sidebar-list-item:hover {
            color: var(--color-primary);
        }

        .sidebar-list-item .item-date {
            flex-shrink: 0;
            width: 48px;
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--color-primary);
            background-color: var(--color-primary-bg);
            padding: 4px 6px;
            border-radius: var(--radius-sm);
        }

        .sidebar-list-item .item-info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-list-item .item-city {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar-list-item:hover .item-city {
            color: var(--color-primary);
        }

        .sidebar-list-item .item-venue {
            font-size: 12px;
            color: var(--color-text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar-list-item .item-status {
            flex-shrink: 0;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }

        .sidebar-list-item .item-status.past {
            background-color: #D1FAE5;
            color: #065F46;
        }

        .sidebar-list-item .item-status.upcoming {
            background-color: #DBEAFE;
            color: #1E40AF;
        }

        /* 复制成功提示 */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background-color: #065F46;
            color: #ffffff;
            padding: 10px 24px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 广告间距 */
        .ad-gap {
            margin-bottom: 20px;
        }

        /* ===== 手机端适配 ===== */
        @media screen and (max-width: 767px) {
            .setlist-header {
                padding: 20px 0;
            }

            .setlist-header-top {
                gap: 14px;
            }

            .setlist-artist-avatar {
                width: 60px;
                height: 60px;
            }

            .setlist-artist-info h1 {
                font-size: 20px;
            }

            .setlist-tour-name {
                font-size: 13px;
            }

            .setlist-show-meta {
                gap: 12px;
                font-size: 13px;
            }

            .setlist-header-bottom {
                flex-direction: column;
                align-items: flex-start;
            }

            .setlist-section {
                padding: 16px;
                margin-bottom: 16px;
            }

            .setlist-section-title {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .setlist-item {
                padding: 10px 12px;
                gap: 10px;
            }

            .setlist-item .song-index {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }

            .setlist-item .song-title {
                font-size: 14px;
            }

            .song-detail {
                padding-left: 50px;
            }

            .compare-panel-content {
                width: 95%;
                padding: 20px;
            }

            .sidebar {
                width: 100%;
            }
        }

        /* ===== 平板适配 ===== */
        @media screen and (min-width: 768px) and (max-width: 1024px) {
            .sidebar {
                width: 260px;
            }
        }
    </style>
</head>
<body>
    <nav id="navbar"></nav>
    <nav id="mobile-nav"></nav>

    <!-- 顶部信息区 -->
    <div class="setlist-header" id="setlist-header">
        <div class="container">
            <div class="setlist-header-top" id="header-top">
                <!-- JS动态渲染 -->
            </div>
            <div class="setlist-show-meta" id="show-meta">
                <!-- JS动态渲染 -->
            </div>
            <div class="setlist-header-bottom" id="header-bottom">
                <!-- JS动态渲染 -->
            </div>
        </div>
    </div>

    <main class="page-wrapper">
        <div class="container">
            <!-- 面包屑 -->
            <div id="breadcrumb" style="padding: 12px 0;"></div>

            <!-- 广告位：顶部横幅 -->
            <div id="ad-top-banner" class="ad-gap"></div>

            <!-- 主内容区布局 -->
            <div class="setlist-layout">
                <!-- 左侧主内容 -->
                <div class="setlist-main">
                    <!-- 曲目列表区 -->
                    <div class="setlist-section" id="setlist-section">
                        <!-- JS动态渲染 -->
                    </div>
                </div>

                <!-- 右侧侧边栏 -->
                <div class="sidebar" id="sidebar">
                    <!-- 广告位：侧边栏广告1 -->
                    <div id="ad-sidebar-1" class="ad-gap"></div>

                    <!-- 该歌手其他巡演场次 -->
                    <div class="sidebar-widget" id="other-shows-widget">
                        <!-- JS动态渲染 -->
                    </div>

                    <!-- 后续巡演计划 -->
                    <div class="sidebar-widget" id="upcoming-shows-widget">
                        <!-- JS动态渲染 -->
                    </div>

                    <!-- 同城市其他演唱会 -->
                    <div class="sidebar-widget" id="same-city-widget">
                        <!-- JS动态渲染 -->
                    </div>

                    <!-- 广告位：侧边栏广告2 -->
                    <div id="ad-sidebar-2" class="ad-gap"></div>
                </div>
            </div>

            <!-- 广告位：底部横幅 -->
            <div id="ad-bottom-banner" class="ad-gap" style="margin-top: 24px;"></div>
        </div>
    </main>

    <footer id="footer"></footer>

    <!-- 手机端底部粘性广告 -->
    <div id="ad-mobile-sticky"></div>

    <!-- 对比面板 -->
    <div class="compare-panel" id="compare-panel">
        <div class="compare-panel-content" id="compare-panel-content">
            <!-- JS动态渲染 -->
        </div>
    </div>

    <!-- 复制成功提示 -->
    <div class="toast" id="toast"></div>

    <script src="js/data.js"></script>
    <script src="js/common.js"></script>
    <script>
        // 初始化应用
        initApp();

        // ==================== 从URL参数获取场次ID ====================
        const urlParams = new URLSearchParams(window.location.search);
        const showId = urlParams.get('id') || 'sh01-01'; // 默认展示第一场

        // ==================== 获取数据 ====================
        const show = getShowById(showId);
        const tour = show ? getTourById(show.tourId) : null;
        const singer = tour ? getSingerById(tour.singerId) : null;
        const songs = getSetlistByShowId(showId);
        const isPast = show ? show.isPast : true;

        // ==================== 渲染顶部信息区 ====================
        function renderHeader() {
            if (!show || !tour || !singer) {
                document.getElementById('setlist-header').innerHTML = `
                    <div class="container">
                        <h1 style="color:#fff;">未找到该场次信息</h1>
                        <a href="index.html" style="color:rgba(255,255,255,0.8);">返回首页</a>
                    </div>
                `;
                return;
            }

            // 歌手信息
            document.getElementById('header-top').innerHTML = `
                <img class="setlist-artist-avatar"
                     src="${singer.avatar}"
                     alt="${singer.name}"
                     onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%23ddd%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 font-size=%2240%22>🎵</text></svg>'">
                <div class="setlist-artist-info">
                    <h1>${singer.name}</h1>
                    <p class="setlist-tour-name">${tour.name}</p>
                </div>
            `;

            // 场次信息
            document.getElementById('show-meta').innerHTML = `
                <span><span class="meta-icon">📅</span> ${formatDate(show.date)}</span>
                <span><span class="meta-icon">📍</span> ${show.city}</span>
                <span><span class="meta-icon">🏟️</span> ${show.venue}</span>
            `;

            // 状态标识 + 收藏 + 分享
            const statusHtml = isPast
                ? `<span class="status-badge status-past">● 已举办</span>`
                : `<span class="status-badge status-upcoming">● 后续场次</span><span class="upcoming-hint">预计曲目，以现场为准</span>`;

            const sources = [...new Set(songs.map(s => s.source).filter(Boolean))];
            const sourceHtml = sources.length > 0
                ? `<span class="source-tag">信息来源：${sources.join('、')}</span>`
                : '';

            document.getElementById('header-bottom').innerHTML = `
                <div class="setlist-status-info">
                    ${statusHtml}
                    ${sourceHtml}
                    <span class="update-time">更新于 2026-05-10</span>
                </div>
                <div class="setlist-actions">
                    <button class="btn-favorite" id="btn-fav" data-show-id="${showId}">
                        <span class="heart-icon">🤍</span>
                        <span>收藏</span>
                    </button>
                    <div class="share-buttons">
                        <button class="share-btn" title="分享到微信" onclick="shareToWechat()">💬</button>
                        <button class="share-btn" title="分享到微博" onclick="shareToWeibo()">📱</button>
                        <button class="share-btn" title="复制链接" onclick="copyLink()">🔗</button>
                    </div>
                </div>
            `;

            // 初始化收藏按钮状态
            updateFavoriteButton();
        }

        // ==================== 收藏功能 ====================
        function updateFavoriteButton() {
            const btn = document.getElementById('btn-fav');
            if (!btn) return;
            const fav = isFavorited(showId);
            btn.classList.toggle('favorited', fav);
            btn.querySelector('.heart-icon').textContent = fav ? '❤️' : '🤍';
            btn.querySelector('span:last-child').textContent = fav ? '已收藏' : '收藏';
        }

        document.addEventListener('click', function(e) {
            const btn = e.target.closest('#btn-fav');
            if (btn) {
                toggleFavorite(showId);
                updateFavoriteButton();
            }
        });

        // ==================== 渲染面包屑 ====================
        function renderBreadcrumbNav() {
            if (!show || !tour || !singer) return;
            const html = renderBreadcrumb([
                { label: '首页', url: 'index.html' },
                { label: singer.name, url: `singer.html?id=${singer.id}` },
                { label: tour.name, url: `tour.html?id=${tour.id}` },
                { label: `${show.city}场` }
            ]);
            document.getElementById('breadcrumb').innerHTML = html;
        }

        // ==================== 渲染曲目列表 ====================
        function renderSetlist() {
            if (!show || !tour || !singer) return;

            const regularSongs = songs.filter(s => !s.isEncore);
            const encoreSongs = songs.filter(s => s.isEncore);
            const totalCount = songs.length;

            let html = `
                <div class="setlist-section-title">
                    <h2>🎵 完整曲目单 <span class="song-count">共${totalCount}首</span></h2>
                    <button class="btn-compare" onclick="openComparePanel()">对比其他场次</button>
                </div>
            `;

            // 正式曲目
            html += '<div class="song-list">';
            regularSongs.forEach((song, idx) => {
                html += renderSongItem(song, idx + 1);
            });
            html += '</div>';

            // 安可分隔线
            if (encoreSongs.length > 0) {
                html += `
                    <div class="encore-divider">
                        <span>♪ 安可 Encore ♪</span>
                    </div>
                `;
                html += '<div class="song-list">';
                encoreSongs.forEach((song, idx) => {
                    html += renderSongItem(song, regularSongs.length + idx + 1);
                });
                html += '</div>';
            }

            document.getElementById('setlist-section').innerHTML = html;

            // 绑定曲目展开/折叠事件
            document.querySelectorAll('.setlist-item').forEach(item => {
                item.addEventListener('click', function() {
                    const detailId = this.dataset.detailId;
                    const detail = document.getElementById(detailId);
                    if (detail) {
                        this.classList.toggle('expanded');
                        detail.classList.toggle('show');
                    }
                });
            });
        }

        function renderSongItem(song, index) {
            const detailId = `detail-${song.id}`;
            let tagsHtml = '';
            if (song.isEncore) tagsHtml += '<span class="tag tag-encore">安可</span>';
            if (song.isCover) tagsHtml += '<span class="tag tag-cover">翻唱/改编</span>';
            if (song.highlight && (song.highlight.includes('大合唱') || song.highlight.includes('全场') || song.highlight.includes('沸腾') || song.highlight.includes('泪目'))) {
                tagsHtml += '<span class="tag tag-classic">经典曲目</span>';
            }

            const highlightHtml = song.highlight
                ? `<div class="song-highlight">${song.highlight}</div>`
                : '';

            const albumInfo = song.album
                ? `<div class="detail-row"><span class="detail-label">专辑：</span><span class="detail-value">${song.album}</span></div>`
                : '';
            const yearInfo = song.year
                ? `<div class="detail-row"><span class="detail-label">发行：</span><span class="detail-value">${song.year}年</span></div>`
                : '';
            const sourceInfo = song.source
                ? `<div class="detail-source">来源：${song.source}</div>`
                : '';

            return `
                <div class="setlist-item" data-detail-id="${detailId}">
                    <span class="song-index">${index}</span>
                    <div class="song-info">
                        <div class="song-title">
                            ${song.songName}
                            <span class="expand-icon">▶</span>
                        </div>
                        <div class="song-tags">${tagsHtml}</div>
                        ${highlightHtml}
                    </div>
                </div>
                <div class="song-detail" id="${detailId}">
                    ${albumInfo}
                    ${yearInfo}
                    ${sourceInfo}
                </div>
            `;
        }

        // ==================== 渲染侧边栏 ====================
        function renderSidebar() {
            if (!show || !tour || !singer) return;

            // 该歌手其他巡演场次
            const otherShows = getShowsByTourId(tour.id)
                .filter(s => s.id !== showId)
                .slice(0, 5);

            let otherShowsHtml = `
                <div class="sidebar-widget-title">📋 其他场次</div>
                <div class="sidebar-list">
            `;
            if (otherShows.length > 0) {
                otherShows.forEach(s => {
                    const shortDate = s.date.split('-').slice(1).join('/');
                    const statusClass = s.isPast ? 'past' : 'upcoming';
                    const statusText = s.isPast ? '已举办' : '未举办';
                    otherShowsHtml += `
                        <a href="setlist.html?id=${s.id}" class="sidebar-list-item">
                            <span class="item-date">${shortDate}</span>
                            <div class="item-info">
                                <div class="item-city">${s.city}场</div>
                                <div class="item-venue">${s.venue}</div>
                            </div>
                            <span class="item-status ${statusClass}">${statusText}</span>
                        </a>
                    `;
                });
            } else {
                otherShowsHtml += '<div style="font-size:13px;color:var(--color-text-muted);padding:10px 0;">暂无其他场次</div>';
            }
            otherShowsHtml += '</div>';
            document.getElementById('other-shows-widget').innerHTML = otherShowsHtml;

            // 后续巡演计划
            const upcomingShows = getShowsByTourId(tour.id)
                .filter(s => !s.isPast)
                .slice(0, 5);

            let upcomingHtml = `
                <div class="sidebar-widget-title">🎫 后续巡演计划</div>
                <div class="sidebar-list">
            `;
            if (upcomingShows.length > 0) {
                upcomingShows.forEach(s => {
                    const shortDate = s.date.split('-').slice(1).join('/');
                    upcomingHtml += `
                        <a href="setlist.html?id=${s.id}" class="sidebar-list-item">
                            <span class="item-date">${shortDate}</span>
                            <div class="item-info">
                                <div class="item-city">${s.city}场</div>
                                <div class="item-venue">${s.venue}</div>
                            </div>
                            <span class="item-status upcoming">${s.ticketStatus}</span>
                        </a>
                    `;
                });
            } else {
                upcomingHtml += '<div style="font-size:13px;color:var(--color-text-muted);padding:10px 0;">暂无后续场次安排</div>';
            }
            upcomingHtml += '</div>';
            document.getElementById('upcoming-shows-widget').innerHTML = upcomingHtml;

            // 同城市其他演唱会
            const sameCityShows = shows
                .filter(s => s.city === show.city && s.id !== showId)
                .slice(0, 5);

            let sameCityHtml = `
                <div class="sidebar-widget-title">📍 ${show.city}其他演唱会</div>
                <div class="sidebar-list">
            `;
            if (sameCityShows.length > 0) {
                sameCityShows.forEach(s => {
                    const sTour = getTourById(s.tourId);
                    const sSinger = sTour ? getSingerById(sTour.singerId) : null;
                    const shortDate = s.date.split('-').slice(1).join('/');
                    const statusClass = s.isPast ? 'past' : 'upcoming';
                    sameCityHtml += `
                        <a href="setlist.html?id=${s.id}" class="sidebar-list-item">
                            <span class="item-date">${shortDate}</span>
                            <div class="item-info">
                                <div class="item-city">${sSinger ? sSinger.name : '未知'} - ${show.city}场</div>
                                <div class="item-venue">${s.venue}</div>
                            </div>
                            <span class="item-status ${statusClass}">${s.isPast ? '已举办' : s.ticketStatus}</span>
                        </a>
                    `;
                });
            } else {
                sameCityHtml += '<div style="font-size:13px;color:var(--color-text-muted);padding:10px 0;">暂无同城市其他演唱会</div>';
            }
            sameCityHtml += '</div>';
            document.getElementById('same-city-widget').innerHTML = sameCityHtml;
        }

        // ==================== 对比面板 ====================
        window.openComparePanel = function() {
            if (!tour) return;
            const allShows = getShowsByTourId(tour.id);

            let html = `
                <div class="compare-panel-header">
                    <h3>对比其他场次曲目</h3>
                    <button class="compare-close-btn" onclick="closeComparePanel()">✕</button>
                </div>
                <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:16px;">
                    选择同巡演的其他场次，查看曲目差异对比。
                </p>
                <div class="compare-show-list">
            `;

            allShows.forEach(s => {
                const isActive = s.id === showId;
                const sSongs = getSetlistByShowId(s.id);
                const shortDate = s.date.split('-').slice(1).join('/');
                html += `
                    <a href="setlist.html?id=${s.id}" class="compare-show-item" style="${isActive ? 'border:2px solid var(--color-primary);background-color:var(--color-primary-bg);' : ''}">
                        <span class="compare-date">${shortDate}</span>
                        <div class="compare-info">
                            <div class="compare-city">${s.city}场 ${isActive ? '（当前）' : ''}</div>
                            <div class="compare-venue">${s.venue}</div>
                        </div>
                        <span class="compare-count">${sSongs.length}首曲目</span>
                    </a>
                `;
            });

            html += '</div>';
            document.getElementById('compare-panel-content').innerHTML = html;
            document.getElementById('compare-panel').classList.add('show');
        };

        window.closeComparePanel = function() {
            document.getElementById('compare-panel').classList.remove('show');
        };

        // 点击遮罩关闭对比面板
        document.getElementById('compare-panel').addEventListener('click', function(e) {
            if (e.target === this) {
                closeComparePanel();
            }
        });

        // ==================== 分享功能 ====================
        window.shareToWechat = function() {
            showToast('请截图或复制链接分享到微信');
        };

        window.shareToWeibo = function() {
            const text = singer && tour
                ? `${singer.name}${tour.name}${show ? show.city + '场' : ''}曲目单 - 演唱会曲目参考`
                : '演唱会曲目单';
            const url = window.location.href;
            window.open(`https://service.weibo.com/share/share.php?title=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
        };

        window.copyLink = function() {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    showToast('链接已复制到剪贴板');
                }).catch(() => {
                    fallbackCopy();
                });
            } else {
                fallbackCopy();
            }
        };

        function fallbackCopy() {
            const input = document.createElement('input');
            input.value = window.location.href;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            showToast('链接已复制到剪贴板');
        }

        // ==================== Toast 提示 ====================
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
        window.showToast = showToast;

        // ==================== 渲染广告位 ====================
        document.getElementById('ad-top-banner').innerHTML = renderAd('banner', 'setlist-top');
        document.getElementById('ad-sidebar-1').innerHTML = renderAd('sidebar', 'setlist-side1');
        document.getElementById('ad-sidebar-2').innerHTML = renderAd('sidebar', 'setlist-side2');
        document.getElementById('ad-bottom-banner').innerHTML = renderAd('banner', 'setlist-bottom');
        document.getElementById('ad-mobile-sticky').innerHTML = renderAd('mobile-sticky', 'setlist-mobile');

        // ==================== 页面初始化 ====================
        renderHeader();
        renderBreadcrumbNav();
        renderSetlist();
        renderSidebar();

        // 更新页面标题
        if (singer && tour && show) {
            document.title = `${singer.name} ${show.city}场曲目单 - ${tour.name} - 演唱会曲目参考`;
        }
    </script>
</body>
</html>
